name: Build App Windows
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    # 1. Nâng cấp lên v4 để tránh lỗi tương thích
    - uses: actions/checkout@v4 
    
    - name: Set up Python
      # 2. Nâng cấp lên v5 để chạy mượt mà nhất
      uses: actions/setup-python@v5 
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install customtkinter matplotlib openpyxl pyinstaller
        
    - name: Run PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data="database/schema.sql;database" main.py
        
    - name: Upload Artifact
      # 3. ĐÂY LÀ ĐOẠN SỬA LỖI CHÍNH: Chuyển v3 thành v4
      uses: actions/upload-artifact@v4 
      with:
        name: DCCD-Windows-App
        path: dist/main.exe